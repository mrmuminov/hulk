name: Go

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: CGO_ENABLED=0 go test -v -cover -count=1 .

      - name: Build linux/amd64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o hulk-linux-amd64 .

      - name: Build linux/arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -trimpath -o hulk-linux-arm64 .

      - name: Build windows/amd64
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o hulk-windows-amd64.exe .

      - name: Build darwin/amd64
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o hulk-darwin-amd64 .

      - name: Build darwin/arm64
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -trimpath -o hulk-darwin-arm64 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hulk-binaries
          path: hulk-*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hulk-binaries

      - name: Checksum
        run: sha256sum hulk-* > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hulk-linux-amd64
            hulk-linux-arm64
            hulk-windows-amd64.exe
            hulk-darwin-amd64
            hulk-darwin-arm64
            checksums.txt
