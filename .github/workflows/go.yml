name: Go

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: CGO_ENABLED=0 go test -v -cover -count=1 .

      - name: Build
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -trimpath -o hulk${{ matrix.ext }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hulk-${{ matrix.goos }}-${{ matrix.goarch }}
          path: hulk${{ matrix.ext }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Checksum
        run: sha256sum hulk-*/* > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hulk-linux-amd64/hulk
            hulk-linux-arm64/hulk
            hulk-windows-amd64/hulk.exe
            hulk-darwin-amd64/hulk
            hulk-darwin-arm64/hulk
            checksums.txt
