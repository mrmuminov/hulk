name: Go

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -trimpath -o hulk .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hulk-linux-amd64
          path: hulk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build (linux amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o hulk-linux-amd64 .

      - name: Build (linux arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -trimpath -o hulk-linux-arm64 .

      - name: Checksum
        run: sha256sum hulk-* > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hulk-linux-amd64
            hulk-linux-arm64
            checksums.txt
